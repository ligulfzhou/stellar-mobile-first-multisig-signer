name: VaultSigner
options:
  bundleIdPrefix: com.multisig
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    OTHER_LDFLAGS: ["-lvault_signer_ffi", "-lc++", "-framework", "Security"]
    HEADER_SEARCH_PATHS:
      - $(PROJECT_DIR)/../bindings/swift
    SWIFT_OBJC_BRIDGING_HEADER: $(PROJECT_DIR)/VaultSigner/VaultSigner-Bridging-Header.h
targets:
  VaultSigner:
    type: application
    platform: iOS
    sources:
      - path: VaultSigner
      - path: ../bindings/swift/vault_signer_ffi.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.multisig.vaultsigner
        LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]:
          - $(PROJECT_DIR)/Vendor/ios-sim
        LIBRARY_SEARCH_PATHS[sdk=iphoneos*]:
          - $(PROJECT_DIR)/Vendor/ios
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
    info:
      path: VaultSigner/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Vault Signer
